<!DOCTYPE html>
<html>
<head>
  <title>MAPO Alfath Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f1f2f6;
    }

    .header {
      background: #27ae60;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .banner {
      background: url('https://images.unsplash.com/photo-1606813907291-d86efa9b94db') no-repeat center;
      background-size: cover;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    .container {
      padding: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: block;
      text-align: center;
      background: #25D366;
      color: white;
      padding: 8px;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 5px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">
  🛒 MAPO Alfath Store
</div>

<div class="banner">
  <h2>Selamat Datang</h2>
  <p>Belanja kebutuhan harian dengan mudah</p>
</div>

<div class="container">

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
      <h4>Beras 5Kg</h4>
      <p>Rp 70.000</p>
      <a class="btn" href="https://wa.me/6287762803657?text=Pesan Beras 5Kg">Beli</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
      <h4>Minyak Goreng</h4>
      <p>Rp 20.000</p>
      <a class="btn" href="https://wa.me/6287762803657?text=Pesan Minyak Goreng">Beli</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
      <h4>Gula Pasir</h4>
      <p>Rp 15.000</p>
      <a class="btn" href="https://wa.me/6287762803657?text=Pesan Gula Pasir">Beli</a>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1590080877777-5b2a7c51a4c3">
      <h4>Telur Ayam</h4>
      <p>Rp 30.000</p>
      <a class="btn" href="https://wa.me/6287762803657?text=Pesan Telur Ayam">Beli</a>
    <img src="logo png"
      style="wdth:60px ; ">< br>

  </div>

</div>

</body>
</html>
