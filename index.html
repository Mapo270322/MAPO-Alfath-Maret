
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MAPO Alfath Maret</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #f5f5f5;
}

.header {
background: green;
color: white;
text-align: center;
padding: 15px;
}
.header {
background: green;
color: white;
text-align: center;
padding: 15px;
}

/* ⬇️ TARUH DI SINI */
.logo-row {
display: flex;
justify-content: center;
align-items: center;
gap: 10px;
}

.logo-kiri {
width: 40px;
}

.logo {

}
.container {

}

.grid {

grid-template-columns: 1fr 1fr;

.card {

.card img {

.card h4 {

}

.card p {

button {

color: black;

}

bottom: 20px;
left: 20px;
transform: translateX(-50%);;

font-weight: bold;
z-index: 999;
opacity: 0;
transition : all 0.3s ease;
}
.notif.show {

}
#listKeranjang li {
display: flex;
justify-content: space-between;
align-items: center;

}

padding: 5px 10px;
border-radius: 5px;
width: auto;

</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a8f08">
</head>

<body>

<div class="header">
<div class="logo-row">
<img src="fifa26.jpg" class="logo-kiri">
<img src="logo8.png" class="logo">
</div>

<h2>MAPO Maret</h2>
<p>Toko Kebutuhan Harian</p>
<p>Mudah Dijangkau & Harga Terjankau</p>
<p>Jl.Sungai Siak 611 Ketang Baru Manado</p>
</div>
<audio id="lagu">
<source src="mapo.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('lagu').play()">
▶️ Putar Lagu MAPO
</button>
</div>

<!-- DOWNLOAD -->
<div style="text-align:center; margin-bottom:10px;">
<a href="https://drive.google.com/file/d/1q8tme7-0YLtaZ4vVVEE5ZLXRIWzWMwX7/view?usp=drivesdk" target="_blank">
<button style="background:green;">📥 Download Aplikasi</button>
</a>
</div>

<!-- KERANJANG -->
<div style="background:#fff; padding:10px; border-radius:10px; margin-bottom:10px;">
<h3>🛒 Keranjang</h3>
<ul id="listKeranjang"></ul>
<div id="totalBelanja"></div>
</div>
<button onclick="kirimWA()">📲 Pesan via WhatsApp</button>

<button onclick="kosongkanKeranjang()">
🗑 Kosongkan Keranjang
</button>

</div>
<input
type="text"
id="cariProduk"
placeholder="🔍 Cari produk..."
onkeyup="cariProduk()"
style="width:95%;padding:15px;margin:10px;border-radius:8px;border:1px solid #ccc;">
<div class="kategori-filter">
<button onclick="filterKategori('Semua')">Semua</button>
<button onclick="filterKategori('Beras')">🌾 Beras</button>
<button onclick="filterKategori('Minyak Goreng')">🛢️ Minyak</button>
<button onclick="filterKategori('Telur')">🥚 Telur</button>
</div>
<!-- JUDUL -->
<div style="background:#28a745; color:white; padding:10px; border-radius:10px;">
<h3 style="text-align:center;">Daftar Menu</h3>
</div>
<div class="container">
<div class="grid" id="daftarProduk">
</div>
<!-- PRODUK -->
</div>

<script>

let keranjang =
JSON.parse(localStorage.getItem("keranjang")) || [];
function tambahKeKeranjang(nama, harga) {

let item = keranjang.find(p => p.nama === nama);

if (item) {
item.jumlah++;
} else {
keranjang.push({
nama: nama,
harga: harga,
jumlah: 1
});
}

localStorage.setItem("keranjang", JSON.stringify(keranjang));
tampilkanKeranjang();
}

function hapusDariKeranjang(index) {
keranjang.splice(index, 1);
localStorage.setItem("keranjang", JSON.stringify(keranjang));
tampilkanKeranjang();
}

function tambahJumlah(index) {
keranjang[index].jumlah++;

localStorage.setItem("keranjang", JSON.stringify(keranjang));
tampilkanKeranjang();
}

function kurangJumlah(index) {
if (keranjang[index].jumlah > 1) {
keranjang[index].jumlah--;
} else {
keranjang.splice(index, 1);
}

localStorage.setItem("keranjang", JSON.stringify(keranjang));
tampilkanKeranjang();
}

function kosongkanKeranjang() {
if (confirm("Yakin ingin mengosongkan keranjang?")) {
keranjang = [];
localStorage.removeItem("keranjang");
tampilkanKeranjang();


}


localStorage.setItem("keranjang", JSON.stringify(keranjang));
tampilkanKeranjang();
}

function tampilkanKeranjang() {
let list = document.getElementById("listKeranjang");
list.innerHTML = "";

let total = 0;

keranjang.forEach((item, index) => {

let li = document.createElement("li");

li.innerHTML =
"<b>" + item.nama + "</b><br>" +
"Rp " + Number(item.harga).toLocaleString("id-ID") +
"<br>" +
'<button onclick="kurangJumlah(' + index + ')">-</button> ' +
item.jumlah +
' <button onclick="tambahJumlah(' + index + ')">+</button> ' +
' <button onclick="hapusDariKeranjang(' + index + ')">Hapus</button>';

list.appendChild(li);

total += Number(item.harga) * item.jumlah;
});

document.getElementById("totalBelanja").innerHTML =
"<b>Total: Rp " +
total.toLocaleString("id-ID") +
"</b>";
}


function kirimWA() {
keranjang = [];
tampilkanKeranjang();

let pesan = "Pesanan saya:%0A";
let total = 0;

keranjang.forEach((item, i) => {
pesan +=
(i + 1) +
". " +
item.nama +
" - Rp " +
item.harga +
"%0A";

total += Number(item.harga);
});

pesan += "%0ATotal: Rp " + total;

window.open(
"https://wa.me/6287762803657?text=" + pesan

);
}
let kategoriAktif = "Semua";
function cariProduk() {

let input = document.getElementById("cariProduk").value.toLowerCase();

let card = document.querySelectorAll(".card");

card.forEach(function(item) {

let nama = item.querySelector("h4").innerText.toLowerCase();
let kategori = item.querySelector("p").innerText;

let cocokNama = nama.includes(input);
let cocokKategori = (kategoriAktif === "Semua") || kategori.includes(kategoriAktif);

if (cocokNama && cocokKategori) {
item.style.display = "";
} else {
item.style.display = "none";
}

});

}

function filterKategori(kategori) {
kategoriAktif = kategori;
cariProduk();
}

let card = document.querySelectorAll(".card");

card.forEach(function(item) {

let teksKategori = item.querySelector("p").innerText;

if (kategori === "Semua") {
item.style.display = "";
} else if (teksKategori.includes(kategori)) {
item.style.display = "";
} else {
item.style.display = "none";
}

});

}
function tampilkanProdukAdmin() {

let daftar = document.getElementById("daftarProduk");

if (!daftar) return;

let produk = JSON.parse(localStorage.getItem("produk")) || [];

daftar.innerHTML = "";

produk.forEach(function(item){

daftar.innerHTML += &lt;div class="card"&gt; &lt;img src="${item.gambar}">
<h4>`${item.nama}</h4>

<p><b>Kategori: 

{Number(item.harga).toLocaleString("id-ID")}</p>

<button onclick="tambahKeKeranjang('

{item.harga})">
🛒 Tambah
</button>
</div>
`;

});

}
tampilkanProdukAdmin();

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

tampilkanKeranjang();



</script>

</body>
</html>
