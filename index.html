<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MAPO Alfath Maret</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:green;
color:white;
text-align:center;
padding:15px;
}

.container{
padding:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.card h4{
margin:5px 0;
}

.card p{
color:green;
font-weight:bold;
}

button{
width:100%;
padding:10px;
background:orange;
border:none;
border-radius:8px;
margin-top:5px;
}
</style>

</head>

<body>

<div class="header">
<h2>MAPO MARET</h2>
<p>Toko Sembako Sederhana</p>
</div>

<div class="container">
<div class="grid" id="daftarProduk"></div>
</div>

<script>

// =====================
// DATA PRODUK (TEST)
// =====================

let produk = [
{
nama:"Telur Ayam",
harga:29000,
gambar:"https://mapo270322.github.io/MAPO-Alfath-Maret/telurayam.jpg"
},
{
nama:"Beras 5kg",
harga:75000,
gambar:"https://mapo270322.github.io/MAPO-Alfath-Maret/beras.jpg"
},
{
nama:"Minyak Goreng",
harga:18000,
gambar:"https://mapo270322.github.io/MAPO-Alfath-Maret/bimoli.jpg"
}
];

// =====================
// TAMPILKAN PRODUK
// =====================

function tampilkanProduk(){

let container = document.getElementById("daftarProduk");

container.innerHTML = "";

produk.forEach(item=>{

container.innerHTML += `
<div class="card">
<img src="${item.gambar}">
<h4>${item.nama}</h4>
<p>Rp ${item.harga.toLocaleString("id-ID")}</p>
<button>+ Keranjang</button>
</div>
`;

});

}

tampilkanProduk();

</script>

</body>
</html>
