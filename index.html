<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAPO Maret</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a8f08">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

/* ==========================
HEADER
========================== */

.header{
    background:green;
    color:white;
    text-align:center;
    padding:15px;
}

.logo-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.logo-kiri{
    width:40px;
}

.logo{
    width:60px;
}

/* ==========================
BUTTON
========================== */

button{
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
}

.btn-green{
    background:#28a745;
    color:white;
}

.btn-orange{
    background:orange;
    color:black;
}

.btn-red{
    background:red;
    color:white;
}

/* ==========================
CONTAINER
========================== */

.container{
    padding:10px;
}

/* ==========================
KERANJANG
========================== */

.keranjang{
    background:white;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
}

#listKeranjang{
    list-style:none;
    margin-top:10px;
}

#listKeranjang li{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin:8px 0;
}

#listKeranjang button{

    width:auto;
    padding:5px 10px;

    background:red;
    color:white;
}

/* ==========================
SEARCH
========================== */

#cariProduk{

    width:100%;

    padding:12px;

    border-radius:8px;

    border:1px solid #ccc;

    margin:10px 0;

}

/* ==========================
FILTER
========================== */

.kategori-filter{

    display:flex;

    gap:8px;

    overflow-x:auto;

    padding-bottom:10px;

}

.kategori-filter button{

    width:auto;

    padding:8px 15px;

    background:#28a745;

    color:white;

    border-radius:20px;

    white-space:nowrap;

}

/* ==========================
JUDUL
========================== */

.judul{

    background:#28a745;

    color:white;

    padding:10px;

    border-radius:10px;

    text-align:center;

    margin-bottom:10px;

}

/* ==========================
GRID PRODUK
========================== */

.grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:10px;

}

.card{

    background:white;

    border-radius:10px;

    padding:10px;

    box-shadow:0 2px 8px rgba(0,0,0,.1);

}

.card img{

    width:100%;

    height:180px;

    object-fit:cover;

    border-radius:8px;

    display:block;

}

.card h4{

    margin:8px 0;

    font-size:15px;

}

.card p{

    margin:4px 0;

}

.harga{

    color:#28a745;

    font-weight:bold;

}

/* ==========================
NOTIFIKASI
========================== */

.notif{

    position:fixed;

    bottom:20px;

    left:50%;

    transform:translateX(-50%);

    background:black;

    color:white;

    padding:10px 20px;

    border-radius:30px;

    display:none;

    z-index:999;

}

.show{

    display:block;

}

</style>

</head>

<body>

<div class="header">

    <div class="logo-row">

        <img src="fifa26.jpg" class="logo-kiri">

        <img src="logo8.png" class="logo">

    </div>

    <h2>MAPO Maret</h2>

    <p>Toko Kebutuhan Harian</p>

    <p>Mudah Dijangkau & Harga Terjangkau</p>

    <p>Jl. Sungai Siak 611 Ketang Baru Manado</p>

</div>

<audio id="lagu">

    <source src="mapo.mp3" type="audio/mpeg">

</audio>

<button class="btn btn-orange"
onclick="document.getElementById('lagu').play()">

▶️ Putar Lagu MAPO

</button>

<div class="container">

<a href="https://drive.google.com/file/d/1q8tme7-0YLtaZ4vVVEE5ZLXRIWzWMwX7/view?usp=drivesdk"
target="_blank">

<button class="btn btn-green">

📥 Download Aplikasi

</button>

</a>

<div class="keranjang">

<h3>🛒 Keranjang</h3>

<ul id="listKeranjang"></ul>

<div id="totalBelanja"></div>

</div>

<button
class="btn btn-green"
onclick="kirimWA()">

📲 Pesan via WhatsApp

</button>

<button
class="btn btn-red"
onclick="kosongkanKeranjang()">

🗑 Kosongkan Keranjang

</button>

<input
id="cariProduk"
type="text"
placeholder="🔍 Cari produk..."
onkeyup="cariProduk()">

<div class="kategori-filter">

<button onclick="filterKategori('Semua')">
Semua
</button>

<button onclick="filterKategori('Beras')">
🌾 Beras
</button>

<button onclick="filterKategori('Minyak Goreng')">
🛢️ Minyak
</button>

<button onclick="filterKategori('Telur')">
🥚 Telur
</button>

</div>

<div class="judul">

<h3>Daftar Menu</h3>

</div>

<div
class="grid"
id="daftarProduk">

</div>

</div>

<div
id="notif"
class="notif">

</div>

<script src="produk.js"></script>
<script>

// =====================================
// MAPO Maret v2.0
// =====================================

// ---------------------------
// DATA
// ---------------------------

let keranjang =
JSON.parse(localStorage.getItem("keranjang")) || [];

let kategoriAktif = "Semua";

// ---------------------------
// NOTIFIKASI
// ---------------------------

function tampilkanNotif(teks){

    const notif = document.getElementById("notif");

    notif.innerHTML = teks;

    notif.classList.add("show");

    setTimeout(function(){

        notif.classList.remove("show");

    },1500);

}

// ---------------------------
// TAMPILKAN PRODUK
// ---------------------------

function tampilkanProduk(){

    const daftar =
    document.getElementById("daftarProduk");

    const cari =
    document
    .getElementById("cariProduk")
    .value
    .toLowerCase();

    daftar.innerHTML = "";

    produk.forEach(function(item,index){

        if(
            !item.nama
            .toLowerCase()
            .includes(cari)
        ){
            return;
        }

        if(
            kategoriAktif!="Semua" &&
            item.kategori!=kategoriAktif
        ){
            return;
        }

        let badge="";

        if(item.bestSeller){

            badge=`
            <div style="
            background:red;
            color:white;
            padding:5px;
            border-radius:5px;
            text-align:center;
            margin-bottom:6px;
            font-size:12px;">
            ⭐ Best Seller
            </div>
            `;

        }

        daftar.innerHTML += `

        <div class="card">

            ${badge}

        <img
    src="${item.gambar}"
    alt="${item.nama}"
    loading="lazy"
    decoding="async"
    onerror="this.src='noimage.png'">

            <h4>${item.nama}</h4>

            <p>${item.kategori}</p>

            <p class="harga">

            Rp
            ${Number(item.harga)
            .toLocaleString("id-ID")}

            </p>

            <button
            class="btn btn-orange"
            onclick="tambahKeKeranjang(${index})">

            🛒 Tambah

            </button>

        </div>

        `;

    });

}

// ---------------------------
// TAMBAH KE KERANJANG
// ---------------------------

function tambahKeKeranjang(index){

    let item = produk[index];

    let ada =
    keranjang.find(function(p){

        return p.nama==item.nama;

    });

    if(ada){

        ada.jumlah++;

    }

    else{

        keranjang.push({

            nama:item.nama,

            harga:item.harga,

            jumlah:1

        });

    }

    simpanKeranjang();

    tampilkanKeranjang();

    tampilkanNotif(
        "✅ "+item.nama+" ditambahkan"
    );

}

// ---------------------------
// SIMPAN
// ---------------------------

function simpanKeranjang(){

    localStorage.setItem(

        "keranjang",

        JSON.stringify(keranjang)

    );

}

// ---------------------------
// TAMPILKAN KERANJANG
// ---------------------------

function tampilkanKeranjang(){

    const list =
    document.getElementById("listKeranjang");

    const total =
    document.getElementById("totalBelanja");

    list.innerHTML="";

    let jumlahTotal=0;

    keranjang.forEach(function(item,index){

        jumlahTotal +=
        item.harga * item.jumlah;

        list.innerHTML += `

        <li>

            <div>

            <b>${item.nama}</b><br>

            Rp
            ${item.harga.toLocaleString("id-ID")}

            × ${item.jumlah}

            </div>

            <button
            onclick="hapusItem(${index})">

            ❌

            </button>

        </li>

        `;

    });

    total.innerHTML=

    "<b>Total : Rp "

    +

    jumlahTotal.toLocaleString("id-ID")

    +

    "</b>";

}

// ---------------------------
// HAPUS ITEM
// ---------------------------

function hapusItem(index){

    keranjang.splice(index,1);

    simpanKeranjang();

    tampilkanKeranjang();

}

// ---------------------------
// KOSONGKAN
// ---------------------------

function kosongkanKeranjang(){

    if(!confirm("Kosongkan keranjang?")){

        return;

    }

    keranjang=[];

    simpanKeranjang();

    tampilkanKeranjang();

}

// ---------------------------
// SEARCH
// ---------------------------

function cariProduk(){

    tampilkanProduk();

}

// ---------------------------
// FILTER
// ---------------------------

function filterKategori(kategori){

    kategoriAktif = kategori;

    tampilkanProduk();

}

// ---------------------------
// WHATSAPP
// ---------------------------

function kirimWA(){

    if(keranjang.length==0){

        alert("Keranjang masih kosong");

        return;

    }

    let pesan =
    "Halo MAPO Maret%0A";

    pesan +=
    "Saya ingin memesan:%0A%0A";

    let total=0;

    keranjang.forEach(function(item){

        let subtotal =
        item.harga * item.jumlah;

        total += subtotal;

        pesan +=

        "• "

        +

        item.nama

        +

        " x"

        +

        item.jumlah

        +

        " = Rp "

        +

        subtotal.toLocaleString("id-ID")

        +

        "%0A";

    });

    pesan +=

    "%0A"

    +

    "Total : Rp "

    +

    total.toLocaleString("id-ID");

    window.open(

        "https://wa.me/6282293311345?text="+pesan,

        "_blank"

    );

}

// ---------------------------
// START
// ---------------------------

document.addEventListener(

"DOMContentLoaded",

function(){

    tampilkanProduk();

    tampilkanKeranjang();

    if("serviceWorker" in navigator){

        navigator.serviceWorker.register(

        "service-worker.js"

        );

    }

}

);

</script>
<!-- JavaScript akan dimasukkan pada BAGIAN 2 -->

</body>
</html>
