// ======================================
// NOTIFIKASI
// ======================================

function tampilkanNotif(teks){

  let notif = document.getElementById("notif");

  notif.innerHTML = teks;
  notif.style.display = "block";

  setTimeout(function(){

    notif.style.display = "none";

  },1500);

}


// ======================================
// TAMPILKAN PRODUK
// ======================================

function tampilkanProduk(){

  let daftar = document.getElementById("daftarProduk");
  alert(daftar);

  daftar.innerHTML = "";

  produk.forEach(function(item,index){

    let badge = "";

    if(item.bestSeller){

      badge =
      '<div style="background:red;color:white;padding:5px;border-radius:6px;text-align:center;font-size:12px;margin-bottom:5px;">⭐ Best Seller</div>';

    }

    daftar.innerHTML += `

    <div class="card">

      ${badge}

      <img src="${item.gambar}" alt="${item.nama}">

      <h4>${item.nama}</h4>

      <p>${item.kategori}</p>

      <p>Rp ${Number(item.harga).toLocaleString("id-ID")}</p>

      <button onclick="tambahKeKeranjang(${index})">

      🛒 Tambah

      </button>

    </div>

    `;

  });

      }
  // ======================================
// TAMBAH KE KERANJANG
// ======================================

function tambahKeKeranjang(index){
  alert("Tombol Tambah diklik. Index = " + index);

  let item = produk[index];

  let ada = keranjang.find(function(p){
    return p.nama === item.nama;
  });

  if (ada) {
    ada.jumlah++;
  } else {
    keranjang.push({
      nama: item.nama,
      harga: item.harga,
      jumlah: 1
    });
  }

  localStorage.setItem("keranjang", JSON.stringify(keranjang));

  tampilkanKeranjang();

  tampilkanNotif("✅ " + item.nama + " ditambahkan");
}

  localStorage.setItem("keranjang", JSON.stringify(keranjang));
  tampilkanProduk();
  tampilkanKeranjang();


}

tampilkanProduk();
tampilkanKeranjang();
