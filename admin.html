<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin MAPO Maret</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#f5f5f5;

    font-family:Arial,Helvetica,sans-serif;

}

.header{

    background:#28a745;

    color:white;

    text-align:center;

    padding:15px;

}

.container{

    max-width:1000px;

    margin:20px auto;

    padding:15px;

}

.card{

    background:white;

    border-radius:10px;

    padding:15px;

    margin-bottom:20px;

    box-shadow:0 2px 8px rgba(0,0,0,.1);

}

h2{

    margin-bottom:15px;

}

label{

    display:block;

    margin-top:10px;

    margin-bottom:5px;

    font-weight:bold;

}

input,
select{

    width:100%;

    padding:10px;

    border:1px solid #ccc;

    border-radius:8px;

}

input[type="checkbox"]{

    width:auto;

}

button{

    border:none;

    border-radius:8px;

    cursor:pointer;

    padding:12px;

}

.btn{

    width:100%;

    margin-top:15px;

    background:#28a745;

    color:white;

}

table{

    width:100%;

    border-collapse:collapse;

}

table th{

    background:#28a745;

    color:white;

    padding:10px;

}

table td{

    border:1px solid #ddd;

    padding:10px;

    text-align:center;

}

.preview{

    width:70px;

    height:70px;

    object-fit:cover;

    border-radius:8px;

}

@media(max-width:700px){

table{

    display:block;

    overflow-x:auto;

}

}

</style>

</head>

<body>

<div class="header">

<h1>Admin MAPO Maret</h1>

<p>Kelola Produk Toko</p>

</div>

<div class="container">

<!-- FORM -->

<div class="card">

<h2>Tambah / Edit Produk</h2>

<input type="hidden" id="editIndex">

<label>Nama Produk</label>

<input
type="text"
id="nama">

<label>Harga</label>

<input
type="number"
id="harga">

<label>Kategori</label>

<select id="kategori">

<option>Beras</option>

<option>Minyak Goreng</option>

<option>Telur</option>

</select>

<label>Nama File Gambar</label>

<input
type="text"
id="gambar"
placeholder="contoh : beras.jpg">

<label>

<input
type="checkbox"
id="bestSeller">

Best Seller

</label>

<button
class="btn"
id="btnSimpan">

💾 Simpan Produk

</button>

</div>

<!-- DAFTAR -->

<div class="card">

<h2>Daftar Produk</h2>

<table>

<thead>

<tr>

<th>No</th>

<th>Foto</th>

<th>Nama</th>

<th>Kategori</th>

<th>Harga</th>

<th>Best Seller</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="tbodyProduk">

<!-- Diisi JavaScript -->

</tbody>

</table>

</div>

</div>

<!-- produk.js -->
<script src="produk.js"></script>


<script>

// =====================================
// MAPO Maret v2.0
// =====================================

// ---------------------------
// DATA
// ---------------------------

let keranjang =
JSON.parse(localStorage.getItem("keranjang")) || [];

let kategoriAktif = "Semua";

// ---------------------------
// NOTIFIKASI
// ---------------------------

function tampilkanNotif(teks){

    const notif = document.getElementById("notif");

    notif.innerHTML = teks;

    notif.classList.add("show");

    setTimeout(function(){

        notif.classList.remove("show");

    },1500);

}

// ---------------------------
// TAMPILKAN PRODUK
// ---------------------------

function tampilkanProduk(){

    const daftar =
    document.getElementById("daftarProduk");

    const cari =
    document
    .getElementById("cariProduk")
    .value
    .toLowerCase();

    daftar.innerHTML = "";

    produk.forEach(function(item,index){

        if(
            !item.nama
            .toLowerCase()
            .includes(cari)
        ){
            return;
        }

        if(
            kategoriAktif!="Semua" &&
            item.kategori!=kategoriAktif
        ){
            return;
        }

        let badge="";

        if(item.bestSeller){

            badge=`
            <div style="
            background:red;
            color:white;
            padding:5px;
            border-radius:5px;
            text-align:center;
            margin-bottom:6px;
            font-size:12px;">
            ⭐ Best Seller
            </div>
            `;

        }

        daftar.innerHTML += `

        <div class="card">

            ${badge}

            <img
            src="${item.gambar}"
            alt="${item.nama}"
            onerror="this.src='noimage.png'">

            <h4>${item.nama}</h4>

            <p>${item.kategori}</p>

            <p class="harga">

            Rp
            ${Number(item.harga)
            .toLocaleString("id-ID")}

            </p>

            <button
            class="btn btn-orange"
            onclick="tambahKeKeranjang(${index})">

            🛒 Tambah

            </button>

        </div>

        `;

    });

}

// ---------------------------
// TAMBAH KE KERANJANG
// ---------------------------

function tambahKeKeranjang(index){

    let item = produk[index];

    let ada =
    keranjang.find(function(p){

        return p.nama==item.nama;

    });

    if(ada){

        ada.jumlah++;

    }

    else{

        keranjang.push({

            nama:item.nama,

            harga:item.harga,

            jumlah:1

        });

    }

    simpanKeranjang();

    tampilkanKeranjang();

    tampilkanNotif(
        "✅ "+item.nama+" ditambahkan"
    );

}

// ---------------------------
// SIMPAN
// ---------------------------

function simpanKeranjang(){

    localStorage.setItem(

        "keranjang",

        JSON.stringify(keranjang)

    );

}

// ---------------------------
// TAMPILKAN KERANJANG
// ---------------------------

function tampilkanKeranjang(){

    const list =
    document.getElementById("listKeranjang");

    const total =
    document.getElementById("totalBelanja");

    list.innerHTML="";

    let jumlahTotal=0;

    keranjang.forEach(function(item,index){

        jumlahTotal +=
        item.harga * item.jumlah;

        list.innerHTML += `

        <li>

            <div>

            <b>${item.nama}</b><br>

            Rp
            ${item.harga.toLocaleString("id-ID")}

            × ${item.jumlah}

            </div>

            <button
            onclick="hapusItem(${index})">

            ❌

            </button>

        </li>

        `;

    });

    total.innerHTML=

    "<b>Total : Rp "

    +

    jumlahTotal.toLocaleString("id-ID")

    +

    "</b>";

}

// ---------------------------
// HAPUS ITEM
// ---------------------------

function hapusItem(index){

    keranjang.splice(index,1);

    simpanKeranjang();

    tampilkanKeranjang();

}

// ---------------------------
// KOSONGKAN
// ---------------------------

function kosongkanKeranjang(){

    if(!confirm("Kosongkan keranjang?")){

        return;

    }

    keranjang=[];

    simpanKeranjang();

    tampilkanKeranjang();

}

// ---------------------------
// SEARCH
// ---------------------------

function cariProduk(){

    tampilkanProduk();

}

// ---------------------------
// FILTER
// ---------------------------

function filterKategori(kategori){

    kategoriAktif = kategori;

    tampilkanProduk();

}

// ---------------------------
// WHATSAPP
// ---------------------------

function kirimWA(){

    if(keranjang.length==0){

        alert("Keranjang masih kosong");

        return;

    }

    let pesan =
    "Halo MAPO Maret%0A";

    pesan +=
    "Saya ingin memesan:%0A%0A";

    let total=0;

    keranjang.forEach(function(item){

        let subtotal =
        item.harga * item.jumlah;

        total += subtotal;

        pesan +=

        "• "

        +

        item.nama

        +

        " x"

        +

        item.jumlah

        +

        " = Rp "

        +

        subtotal.toLocaleString("id-ID")

        +

        "%0A";

    });

    pesan +=

    "%0A"

    +

    "Total : Rp "

    +

    total.toLocaleString("id-ID");

    window.open(

        "https://wa.me/6282293311345?text="+pesan,

        "_blank"

    );

}

// ---------------------------
// START
// ---------------------------

document.addEventListener(

"DOMContentLoaded",

function(){

    tampilkanProduk();

    tampilkanKeranjang();

    if("serviceWorker" in navigator){

        navigator.serviceWorker.register(

        "service-worker.js"

        );

    }

}

);
const produkDefault = JSON.parse(JSON.stringify(produk));

let daftarProduk =
JSON.parse(localStorage.getItem("produk")) || produkDefault;
</script>

</body>
</html>
