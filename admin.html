
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin MAPO</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    margin:0;
}

.header{
    background:green;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    padding:15px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:orange;
    color:black;
    border:none;
    border-radius:6px;
    font-weight:bold;
    margin-top:10px;
}

#daftarProduk{
    margin-top:20px;
}

.card{
    background:white;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="header">
<h2>ADMIN MAPO</h2>
<p>Kelola Produk MAPO Alfath Maret</p>
</div>

<div class="container">

<input type="text" id="namaProduk" placeholder="Nama Produk">

<input type="number" id="hargaProduk" placeholder="Harga Produk">

<label>Kategori</label>

<select id="kategoriProduk">
  <option value="Beras">🌾 Beras</option>
  <option value="Minyak Goreng">🛢️ Minyak Goreng</option>
  <option value="Minuman">🥤 Minuman</option>
  <option value="Mie Instan">🍜 Mie Instan</option>
  <option value="Biskuit">🍪 Biskuit</option>
  <option value="Bumbu Dapur">🧂 Bumbu Dapur</option>
  <option value="Sabun">🧼 Sabun & Deterjen</option>
  <option value="Lainnya">📦 Lainnya</option>
</select>
    
<input type="text" id="gambarProduk" placeholder="Nama file gambar, contoh: beras.jpg">

<button onclick="tambahProduk()">
Tambah Produk
</button>

<div id="daftarProduk"></div>

</div>

<script>
let produk = JSON.parse(localStorage.getItem("produk")) || [];
let editIndex = -1;

function simpanData() {
  localStorage.setItem("produk", JSON.stringify(produk));
}

function resetForm() {
let nama = 
    document.getElementById("namaProduk").value;
let harga = 
    document.getElementById("hargaProduk").value;
    document.getElementById("kategoriProduk").selectedIndex = 0;
    document.getElementById("kategoriProduk").value;
let gambar = 
    document.getElementById("gambarProduk").value;
  
  editIndex = -1;
}

function tambahProduk() {

  let nama = document.getElementById("namaProduk").value.trim();
  let harga = document.getElementById("hargaProduk").value.trim();
  let gambar = document.getElementById("gambarProduk").value.trim();

  if (nama == "" || harga == "" || gambar == "") {
    alert("Semua data harus diisi!");
    return;
  }

  if (editIndex == -1) {
    produk.push({
      nama: nama,
      harga: harga,
      kategori: kategori,
      gambar: gambar
    });
  } else {
    produk[editIndex] = {
      nama: nama,
      harga: harga,
      kategori: kategori,
      gambar: gambar
    };
  }

  simpanData();
  tampilkanProduk();
  resetForm();
}

function editProduk(index) {

  document.getElementById("namaProduk").value = produk[index].nama;
  document.getElementById("hargaProduk").value = produk[index].harga;
  document.getElementById("gambarProduk").value = produk[index].gambar;

  editIndex = index;
}

function hapusProduk(index) {

  if (confirm("Yakin ingin menghapus produk ini?")) {

    produk.splice(index, 1);
    simpanData();
    tampilkanProduk();

  }

}

function tampilkanProduk() {

  let daftar = document.getElementById("daftarProduk");
  daftar.innerHTML = "";

  produk.forEach(function(item, index) {

    daftar.innerHTML += `
    <div class="card">

      <b>${item.nama}</b><br>
      Rp ${Number(item.harga).toLocaleString("id-ID")}<br>
      ${item.gambar}<br><br>

      <button onclick="editProduk(${index})">
      ✏️ Edit
      </button>

      <button onclick="hapusProduk(${index})">
      🗑️ Hapus
      </button>

    </div>
    `;

  });

}

tampilkanProduk();

</script>

</body>
</html>
