<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin MAPO Maret</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#f5f5f5;

    font-family:Arial,Helvetica,sans-serif;

}

.header{

    background:#28a745;

    color:white;

    text-align:center;

    padding:15px;

}

.container{

    max-width:1000px;

    margin:20px auto;

    padding:15px;

}

.card{

    background:white;

    border-radius:10px;

    padding:15px;

    margin-bottom:20px;

    box-shadow:0 2px 8px rgba(0,0,0,.1);

}

h2{

    margin-bottom:15px;

}

label{

    display:block;

    margin-top:10px;

    margin-bottom:5px;

    font-weight:bold;

}

input,
select{

    width:100%;

    padding:10px;

    border:1px solid #ccc;

    border-radius:8px;

}

input[type="checkbox"]{

    width:auto;

}

button{

    border:none;

    border-radius:8px;

    cursor:pointer;

    padding:12px;

}

.btn{

    width:100%;

    margin-top:15px;

    background:#28a745;

    color:white;

}

table{

    width:100%;

    border-collapse:collapse;

}

table th{

    background:#28a745;

    color:white;

    padding:10px;

}

table td{

    border:1px solid #ddd;

    padding:10px;

    text-align:center;

}

.preview{

    width:70px;

    height:70px;

    object-fit:cover;

    border-radius:8px;

}

@media(max-width:700px){

table{

    display:block;

    overflow-x:auto;

}

}

</style>

</head>

<body>

<div class="header">

<h1>Admin MAPO Maret</h1>

<p>Kelola Produk Toko</p>

</div>

<div class="container">

<!-- FORM -->

<div class="card">

<h2>Tambah / Edit Produk</h2>

<input type="hidden" id="editIndex">

<label>Nama Produk</label>

<input
type="text"
id="nama">

<label>Harga</label>

<input
type="number"
id="harga">

<label>Kategori</label>

<select id="kategori">

<option>Beras</option>

<option>Minyak Goreng</option>

<option>Telur</option>

</select>

<label>Nama File Gambar</label>

<input
type="text"
id="gambar"
placeholder="contoh : beras.jpg">

<label>

<input
type="checkbox"
id="bestSeller">

Best Seller

</label>

<button
class="btn"
id="btnSimpan">

💾 Simpan Produk

</button>

</div>

<!-- DAFTAR -->

<div class="card">

<h2>Daftar Produk</h2>

<table>

<thead>

<tr>

<th>No</th>

<th>Foto</th>

<th>Nama</th>

<th>Kategori</th>

<th>Harga</th>

<th>Best Seller</th>

<th>Aksi</th>

</tr>

</thead>

<tbody id="tbodyProduk">

<!-- Diisi JavaScript -->

</tbody>

</table>

</div>

</div>

<!-- produk.js -->
<script src="produk.js"></script>

<!-- JavaScript Admin Bagian 2 ditempatkan di sini -->


</body>
</html>
