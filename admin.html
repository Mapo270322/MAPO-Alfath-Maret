<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin MAPO Maret</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
}

.header{
    background:#28a745;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn{
    width:100%;
    background:#28a745;
    color:white;
    margin-top:15px;
}

.btn-danger{
    background:red;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#28a745;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
    border:1px solid #ddd;
}

.preview{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

</style>

</head>

<body>

<div class="header">
    <h2>ADMIN MAPO MARET</h2>
</div>

<div class="container">

<div class="card">

<h3>Tambah / Edit Produk</h3>

<input type="hidden" id="editIndex">

<label>Nama</label>
<input type="text" id="nama">

<label>Harga</label>
<input type="number" id="harga">

<label>Kategori</label>
<select id="kategori">
    <option value="Beras">Beras</option>
    <option value="Minyak Goreng">Minyak Goreng</option>
    <option value="Telur">Telur</option>
</select>

<label>Gambar (nama file)</label>
<input type="text" id="gambar">
<button onclick="tambah()"> Tambah</button> 
<label>
<input type="checkbox" id="bestSeller">
 Best Seller
</label>

<button class="btn" id="btnSimpan">SIMPAN</button>

</div>

<div class="card">

<h3>DAFTAR PRODUK</h3>

<table>
<thead>
<tr>
<th>No</th>
<th>Gambar</th>
<th>Nama</th>
<th>Kategori</th>
<th>Harga</th>
<th>Best</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbodyProduk"></tbody>

</table>

</div>

</div>

<script>

let produkDefault = [
  {
    nama:"TELUR AYAM 10 btr",
    harga:29000,
    kategori:"Telur",
    gambar:"telurayam.jpg",
    bestSeller:true
  }
];

let produk =
JSON.parse(localStorage.getItem("produk")) || produkDefault;

</script>

<script>

// =========================
// DATA
// =========================

let produkDefault = [...produk];

let daftarProduk =
JSON.parse(localStorage.getItem("produk")) || produkDefault;

// =========================
// FORMAT RUPIAH
// =========================

function rupiah(a){
    return Number(a).toLocaleString("id-ID");
}

// =========================
// SYNC KE TOKO
// =========================

function syncKeToko(){
    localStorage.setItem(
        "produk",
        JSON.stringify(daftarProduk)
    );
}

// =========================
// TAMPILKAN
// =========================

function tampilkanProduk(){

    let tbody = document.getElementById("tbodyProduk");
    tbody.innerHTML = "";

    daftarProduk.forEach((item,i)=>{

        tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>
                <img src="${item.gambar}" class="preview"
                onerror="this.src='noimage.png'">
            </td>
            <td>${item.nama}</td>
            <td>${item.kategori}</td>
            <td>Rp ${rupiah(item.harga)}</td>
            <td>${item.bestSeller ? "⭐" : "-"}</td>
            <td>
                <button onclick="editProduk(${index})">Edit</button>
                 <button onclick="hapusProduk(${index})">Hapus</button>
            </td>
        </tr>
        `;

    });

}

// =========================
// RESET FORM
// =========================

function resetForm(){
    document.getElementById("editIndex").value="";
    document.getElementById("nama").value="";
    document.getElementById("harga").value="";
    document.getElementById("kategori").selectedIndex=0;
    document.getElementById("gambar").value="";
    document.getElementById("bestSeller").checked=false;
}

// =========================
// SIMPAN
// =========================

document.getElementById("btnSimpan")
.addEventListener("click",function(){

    let i = document.getElementById("editIndex").value;

    let data = {
        nama:document.getElementById("nama").value,
        harga:Number(document.getElementById("harga").value),
        kategori:document.getElementById("kategori").value,
        gambar:document.getElementById("gambar").value,
        bestSeller:document.getElementById("bestSeller").checked
    };

    if(!data.nama || !data.harga || !data.gambar){
        alert("Lengkapi data!");
        return;
    }

    if(i===""){
        daftarProduk.push(data);
    }else{
        daftarProduk[i]=data;
    }

    syncKeToko();
    tampilkanProduk();
    resetForm();

});

// =========================
// EDIT
// =========================

function editProduk(i){

    let p = daftarProduk[i];

    document.getElementById("editIndex").value=i;
    document.getElementById("nama").value=p.nama;
    document.getElementById("harga").value=p.harga;
    document.getElementById("kategori").value=p.kategori;
    document.getElementById("gambar").value=p.gambar;
    document.getElementById("bestSeller").checked=p.bestSeller;

    window.scrollTo({top:0,behavior:"smooth"});

}

// =========================
// HAPUS
// =========================

function hapusProduk(i){

    if(!confirm("Hapus produk ini?")) return;

    daftarProduk.splice(i,1);

    syncKeToko();
    tampilkanProduk();

}

// =========================
// START
// =========================

tampilkanProduk();

</script>

</body>
</html>
